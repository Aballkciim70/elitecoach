<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Déconnexion — kpsul_corps</title>
<style>
  html,body{margin:0;height:100%;background:#04100E;color:#ECEFE9;
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .box{padding:24px}
  .pill{width:54px;height:26px;border-radius:99px;margin:0 auto 18px;
    background:linear-gradient(90deg,#E7D9C4 50%,#34E0C8 50%)}
  h1{font-size:20px;margin:0 0 8px}
  p{color:#8A9A93;font-size:14px;margin:0}
  a{color:#34E0C8;text-decoration:none;display:inline-block;margin-top:18px;
    border:1px solid #34E0C8;border-radius:99px;padding:10px 22px}
</style>
</head>
<body>
  <div class="box">
    <div class="pill"></div>
    <h1>Déconnexion…</h1>
    <p>Tu vas être redirigé vers l'accueil.</p>
    <a href="/" id="manual">Revenir maintenant</a>
  </div>

<script>
(function () {
  "use strict";

  // 1. Effacer toute trace de session locale (jetons Supabase, workspace, 2FA)
  function purge(store) {
    try {
      var kill = [];
      for (var i = 0; i < store.length; i++) {
        var k = store.key(i);
        if (k && (/^sb-/.test(k) || k.indexOf("supabase.auth") > -1 ||
                  k.indexOf("kpsul") > -1)) kill.push(k);
      }
      kill.forEach(function (k) { try { store.removeItem(k); } catch (e) {} });
    } catch (e) {}
  }
  try { purge(localStorage); } catch (e) {}
  try { purge(sessionStorage); } catch (e) {}
  try { sessionStorage.setItem("kpsul.activeWorkspace.v1", "client"); } catch (e) {}

  // 2. Effacer les cookies liés à l'auth
  try {
    document.cookie.split(";").forEach(function (c) {
      var name = c.split("=")[0].trim();
      if (/^sb-/.test(name) || name.indexOf("supabase") > -1 || name.indexOf("kpsul") > -1) {
        document.cookie = name + "=;path=/;max-age=0";
      }
    });
  } catch (e) {}

  // 3. Redirection immédiate vers l'accueil (session déjà vidée)
  var target = "/?loggedout=1";
  try { location.replace(target); } catch (e) {
    try { location.href = target; } catch (e2) {}
  }
  // Filet ultime
  setTimeout(function () { try { location.href = "/"; } catch (e) {} }, 400);
})();
</script>
</body>
</html>
