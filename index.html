<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3B82F6">
  <title>EliteCoach - Coaching Fitness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background-color: #0F172A; color: #E2E8F0; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [email, setEmail] = useState('client@example.com');
      const [password, setPassword] = useState('password');
      const [page, setPage] = useState('login');
      const [message, setMessage] = useState('');
      const API_URL = 'https://web-production-52089.up.railway.app';

      const handleLogin = async (e) => {
        e.preventDefault();
        setMessage('Connexion en cours...');
        
        try {
          const response = await fetch(`${API_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          if (response.ok) {
            const data = await response.json();
            setUser({ name: data.user?.name || 'Client', email, role: data.user?.role || 'client' });
            setPage('dashboard');
            setMessage('');
          } else {
            setMessage('Email ou mot de passe incorrect');
          }
        } catch (error) {
          setMessage('Erreur de connexion. Mode offline: comptes de test disponibles');
          setUser({ name: 'Client', email, role: email === 'coach@example.com' ? 'coach' : 'client' });
          setPage('dashboard');
        }
      };

      const handleLogout = () => {
        setUser(null);
        setPage('login');
        setMessage('');
      };

      if (!user) {
        return (
          <div style={styles.authContainer}>
            <div style={styles.authBox}>
              <h1 style={styles.logo}>EliteCoach</h1>
              <p style={styles.tagline}>Coaching Fitness avec IA</p>
              {message && <p style={{ color: '#EF4444', marginBottom: 16 }}>{message}</p>}
              <form onSubmit={handleLogin} style={styles.form}>
                <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} style={styles.input} />
                <input type="password" placeholder="Mot de passe" value={password} onChange={(e) => setPassword(e.target.value)} style={styles.input} />
                <button type="submit" style={styles.btn}>Se connecter</button>
              </form>
              <div style={styles.demoSection}>
                <p style={styles.demoTitle}>Comptes de test:</p>
                <button onClick={() => { setEmail('client@example.com'); setPassword('password'); }} style={styles.demoBtn}>👤 Client</button>
                <button onClick={() => { setEmail('coach@example.com'); setPassword('password'); }} style={styles.demoBtn}>🏆 Coach</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={styles.container}>
          <div style={styles.header}>
            <div style={styles.headerContent}>
              <h1 style={styles.title}>EliteCoach</h1>
              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                <span style={{ fontSize: 12, color: '#94A3B8' }}>{user.name}</span>
                <button onClick={handleLogout} style={styles.logoutBtn}>Déconnexion</button>
              </div>
            </div>
          </div>
          
          <div style={styles.content}>
            {page === 'dashboard' && (
              <>
                <h2>Bienvenue, {user.name}! 👋</h2>
                <div style={styles.statsGrid}>
                  <div style={styles.statCard}><span style={styles.statValue}>5</span><p>Séries</p></div>
                  <div style={styles.statCard}><span style={styles.statValue}>12</span><p>Entraînements</p></div>
                  <div style={styles.statCard}><span style={styles.statValue}>Muscle</span><p>Objectif</p></div>
                  <div style={styles.statCard}><span style={styles.statValue}>Avancé</span><p>Niveau</p></div>
                </div>
                <button onClick={() => setPage('workout')} style={styles.ctaBtn}>🚀 Mon plan d'entraînement</button>
                <div style={styles.cardsGrid}>
                  <div style={styles.card} onClick={() => setPage('progress')}>
                    <h3>📊 Progression</h3>
                    <p>Voir mon historique</p>
                  </div>
                  <div style={styles.card} onClick={() => setPage('coach')}>
                    <h3>💬 Coach IA</h3>
                    <p>Chat 24/7</p>
                  </div>
                </div>
              </>
            )}
            
            {page === 'workout' && (
              <>
                <h2>Ton plan d'entraînement</h2>
                <div style={styles.card}>
                  <h3>Jour 1 - Poitrine & Triceps</h3>
                  <p><strong>Développé couché</strong> - 4 séries x 8-10 reps</p>
                  <p><strong>Écartés</strong> - 3 séries x 10-12 reps</p>
                  <p><strong>Dips</strong> - 3 séries x 8-12 reps</p>
                </div>
                <button onClick={() => setPage('dashboard')} style={styles.ctaBtn}>← Retour</button>
              </>
            )}

            {page === 'progress' && (
              <>
                <h2>Ton historique</h2>
                <div style={styles.card}>
                  <p><strong>2024-01-15</strong></p>
                  <p style={styles.smallText}>60min • 8 exos</p>
                </div>
                <div style={styles.card}>
                  <p><strong>2024-01-14</strong></p>
                  <p style={styles.smallText}>55min • 7 exos</p>
                </div>
                <button onClick={() => setPage('dashboard')} style={styles.ctaBtn}>← Retour</button>
              </>
            )}

            {page === 'coach' && (
              <>
                <h2>Coach IA 💬</h2>
                <div style={styles.card}>
                  <p>Salut! Je suis ton coach IA. Pose-moi tes questions sur l'entraînement! 💪</p>
                </div>
                <button onClick={() => setPage('dashboard')} style={styles.ctaBtn}>← Retour</button>
              </>
            )}
          </div>
        </div>
      );
    }

    const styles = {
      container: { display: 'flex', flexDirection: 'column', height: '100vh', backgroundColor: '#0F172A', color: '#E2E8F0' },
      content: { flex: 1, overflow: 'auto', padding: 20, maxWidth: 1000, margin: '0 auto' },
      header: { backgroundColor: '#1E293B', borderBottom: '1px solid #334155', padding: '12px 20px' },
      headerContent: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' },
      title: { fontSize: 24, fontWeight: 'bold', color: '#3B82F6' },
      logoutBtn: { padding: '8px 16px', backgroundColor: '#EF4444', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12 },
      authContainer: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' },
      authBox: { width: '100%', maxWidth: 400, padding: 32, backgroundColor: '#1E293B', borderRadius: 12, border: '1px solid #334155' },
      logo: { fontSize: 36, fontWeight: 'bold', color: '#3B82F6', marginBottom: 8 },
      tagline: { color: '#94A3B8', marginBottom: 24 },
      form: { display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 },
      input: { padding: '12px', backgroundColor: '#0F172A', border: '1px solid #334155', borderRadius: 6, color: '#E2E8F0', fontFamily: 'inherit' },
      btn: { padding: '12px', backgroundColor: '#3B82F6', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 'bold', fontFamily: 'inherit' },
      demoSection: { marginTop: 20, paddingTop: 20, borderTop: '1px solid #334155' },
      demoTitle: { fontSize: 12, color: '#94A3B8', marginBottom: 8 },
      demoBtn: { width: '100%', padding: '8px', margin: '4px 0', backgroundColor: '#334155', color: '#E2E8F0', border: 'none', borderRadius: 6, cursor: 'pointer', fontFamily: 'inherit' },
      ctaBtn: { width: '100%', padding: '16px', backgroundColor: '#3B82F6', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 'bold', marginTop: 20, marginBottom: 20, fontFamily: 'inherit' },
      statsGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(100px, 1fr))', gap: 12, marginBottom: 24 },
      statCard: { backgroundColor: '#1E293B', borderRadius: 8, padding: 16, border: '1px solid #334155', textAlign: 'center' },
      statValue: { fontSize: 24, fontWeight: 'bold', display: 'block', marginBottom: 8 },
      cardsGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12 },
      card: { backgroundColor: '#1E293B', borderRadius: 8, padding: 16, border: '1px solid #334155', cursor: 'pointer' },
      smallText: { fontSize: 12, color: '#94A3B8' }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
