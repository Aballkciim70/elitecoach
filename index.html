<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3B82F6">
  <title>EliteCoach - Coaching Fitness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background-color: #0F172A; color: #E2E8F0; }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .header { background-color: #1E293B; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; font-weight: bold; color: #3B82F6; }
    .logout { padding: 8px 16px; background-color: #EF4444; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .content { flex: 1; overflow: auto; padding: 20px; max-width: 1000px; margin: 0 auto; }
    .auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .auth-box { width: 100%; max-width: 400px; padding: 32px; background-color: #1E293B; border-radius: 12px; border: 1px solid #334155; }
    .auth-box h1 { font-size: 36px; font-weight: bold; color: #3B82F6; margin-bottom: 8px; }
    .auth-box p { color: #94A3B8; margin-bottom: 24px; }
    .form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    input { padding: 12px; background-color: #0F172A; border: 1px solid #334155; border-radius: 6px; color: #E2E8F0; }
    button { padding: 12px; background-color: #3B82F6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .demo-btn { background-color: #334155; width: 100%; margin: 4px 0; }
    .card { background-color: #1E293B; border-radius: 8px; padding: 16px; border: 1px solid #334155; margin: 12px 0; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API_URL = 'https://web-production-52089.up.railway.app';
    let user = null;

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="auth-container">
          <div class="auth-box">
            <h1>EliteCoach</h1>
            <p>Coaching Fitness avec IA</p>
            <form class="form" onsubmit="handleLogin(event)">
              <input type="email" id="email" value="client@example.com" required />
              <input type="password" id="password" value="password" required />
              <button type="submit">Se connecter</button>
            </form>
            <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px;">
              <p style="font-size: 12px; color: #94A3B8; margin-bottom: 8px;">Comptes de test:</p>
              <button class="demo-btn" onclick="setDemo('client@example.com', 'password')">👤 Client</button>
              <button class="demo-btn" onclick="setDemo('coach@example.com', 'password')">🏆 Coach</button>
            </div>
          </div>
        </div>
      `;
    }

    function setDemo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          const data = await response.json();
          user = { name: data.user?.name || 'Client', email, role: data.user?.role || 'client' };
          renderDashboard();
        } else {
          alert('Email ou mot de passe incorrect');
        }
      } catch (error) {
        user = { name: 'Client', email, role: email === 'coach@example.com' ? 'coach' : 'client' };
        renderDashboard();
      }
    }

    function renderDashboard() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="header">
            <h1>EliteCoach</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
              <span style="font-size: 12px; color: #94A3B8;">${user.name}</span>
              <button class="logout" onclick="handleLogout()">Déconnexion</button>
            </div>
          </div>
          <div class="content">
            <h2>Bienvenue, ${user.name}! 👋</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin: 24px 0;">
              <div class="card" style="text-align: center;"><div style="font-size: 24px; font-weight: bold;">5</div><p>Séries</p></div>
              <div class="card" style="text-align: center;"><div style="font-size: 24px; font-weight: bold;">12</div><p>Entraînements</p></div>
              <div class="card" style="text-align: center;"><div style="font-size: 24px; font-weight: bold;">Muscle</div><p>Objectif</p></div>
              <div class="card" style="text-align: center;"><div style="font-size: 24px; font-weight: bold;">Avancé</div><p>Niveau</p></div>
            </div>
            <button style="width: 100%; padding: 16px; margin: 20px 0;" onclick="showPage('workout')">🚀 Mon plan d'entraînement</button>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;">
              <div class="card" onclick="showPage('progress')"><h3>📊 Progression</h3><p>Voir mon historique</p></div>
              <div class="card" onclick="showPage('coach')"><h3>💬 Coach IA</h3><p>Chat 24/7</p></div>
            </div>
          </div>
        </div>
      `;
    }

    function showPage(page) {
      if (page === 'workout') {
        alert('Plan d\'entraînement: Jour 1 - Poitrine & Triceps\n- Développé couché: 4 séries x 8-10 reps\n- Écartés: 3 séries x 10-12 reps\n- Dips: 3 séries x 8-12 reps');
      } else if (page === 'progress') {
        alert('Historique:\n2024-01-15: 60min • 8 exos\n2024-01-14: 55min • 7 exos');
      } else if (page === 'coach') {
        alert('Coach IA: Salut! Pose-moi tes questions sur l\'entraînement! 💪');
      }
    }

    function handleLogout() {
      user = null;
      renderLogin();
    }

    renderLogin();
  </script>
</body>
</html>
